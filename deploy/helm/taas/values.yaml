# -- Global image settings
image:
  registry: ""
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []

# -- API (FastAPI: jobs, admin, dashboard, websocket)
api:
  replicaCount: 1
  image:
    repository: taas-api
  port: 8000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

# -- Background workers. Each key becomes a Deployment running
#    `python -m app.workers.<key>`. All share the worker image below.
worker:
  image:
    repository: taas-worker
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
workers:
  submit:
    replicaCount: 1
  poller:
    replicaCount: 1
  cleanup:
    replicaCount: 1

# -- Compat server (legacy PERO API: ProArc / AltoEditor)
compat:
  enabled: true
  replicaCount: 1
  image:
    repository: taas-compat
  port: 8001
  ttlSeconds: "3600"
  engines: '{"1": {"domain": "", "label": "Default", "description": "Default OCR engine"}, "2": {"domain": "kramarky", "label": "Kramarky", "description": "Engine for kramarky domain"}}'
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- Redis (StatefulSet) — job queue + pub/sub
redis:
  image:
    repository: redis
    tag: "7-alpine"
  port: 6379
  storage:
    size: 1Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

# -- PostgreSQL via CloudNativePG
cnpg:
  name: taas-db
  instances: 1
  storage:
    size: 10Gi
    storageClassName: ""
  database: taas
  owner: taas
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

# -- MinIO object storage (two instances: incoming uploads + results)
minio:
  image:
    repository: minio/minio
    tag: "latest"
  mcImage:
    repository: minio/mc
    tag: "latest"
  port: 9000
  # -- S3 region for MinIO (MINIO_SITE_REGION) and the presigned-URL signatures. The app's
  # signer and the server must agree on this value, so it's set in one place for both.
  region: eu-central-1
  incoming:
    bucket: incoming
    storage:
      size: 20Gi
      storageClassName: ""
  results:
    bucket: results
    # -- Override for the host presigned download URLs are signed against. Normally derived
    # from expose.minioResults; set this only when you route to minio-results outside the
    # chart (a LoadBalancer IP, an externally-managed DNS name).
    publicUrl: ""
    storage:
      size: 20Gi
      storageClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

# -- In-cluster TuzkaOCR engine. A StatefulSet of identical pods (stable per-ordinal
#    DNS) auto-registered as taas backends; an autoscaler sets the replica count.
ocrEngine:
  enabled: false
  # Static replica count, used ONLY when autoscaling.mode=none (ignored under hpa/keda,
  # where minReplicas/maxReplicas govern). Uncomment to run a fixed pool.
  # replicas: 1
  image:
    repository: registry.gitlab.mzk.cz/osdd/image/tuzka-as-a-service/tuzkaocr
    tag: "1.3.0"
  port: 8000
  # taas concurrent dispatch cap PER POD. Keep TUZKAOCR_MAX_QUEUE >= this.
  maxInflight: 2
  env:
    TUZKAOCR_DEVICE: "cpu"
    TUZKAOCR_OCR_THREADS: "1"
    TUZKAOCR_LINE_WORKERS: "1"
    # 1-CPU scale-out model: one page worker per 1-core pod is the most throughput-
    # efficient shape — the engine scales poorly across cores, so per-core throughput
    # is highest at 1 core (bench/RESULTS_POD_SHAPES.md). Scale by replicas, not pw.
    TUZKAOCR_PAGE_WORKERS: "1"
    TUZKAOCR_MAX_QUEUE: "2"
    # Release ORT memory between pages (see bench/ENGINE_MEMORY.md) — avoids OOM.
    TUZKAOCR_CPU_MEM_ARENA: "false"
    # Pin native BLAS/OMP thread pools to the pod's core budget. WITHOUT these,
    # numpy/opencv/BLAS auto-detect the NODE's full core count and spawn dozens of
    # threads inside the pod, oversubscribing its CPU limit (bench/RESULTS_POD_SHAPES.md).
    OMP_NUM_THREADS: "1"
    OPENBLAS_NUM_THREADS: "1"
    MKL_NUM_THREADS: "1"
    NUMEXPR_NUM_THREADS: "1"
    VECLIB_MAXIMUM_THREADS: "1"
  storage:
    storageClassName: ""
    results: { type: memory, size: 128Mi }
    spool:   { type: memory, size: 256Mi }
  # One core per pod (Guaranteed CPU). 1-core peak ≈ 1.3 GiB with arena off; fits 2Gi.
  resources:
    requests: { cpu: "1", memory: 1500Mi, ephemeral-storage: 256Mi }
    limits:   { cpu: "1", memory: 2Gi,    ephemeral-storage: 1Gi }
  # Long enough to drain in-flight jobs on scale-down before SIGKILL.
  terminationGracePeriodSeconds: 120
  autoscaling:
    mode: hpa                # none | hpa | keda
    minReplicas: 1
    # Upper bound on replicas AND on the number of backend rows taas pre-registers.
    # One core per replica — raise toward your cluster's OCR CPU budget for max
    # throughput (throughput scales ~linearly with replica count).
    maxReplicas: 16
    hpa:
      targetCPUUtilizationPercentage: 70
      scaleDownStabilizationSeconds: 300
    keda:                    # only used when mode=keda (requires the KEDA operator)
      # Empty => the chart's in-cluster Redis (<release>-redis:<redis.port>). Set this
      # only to point KEDA at an external Redis.
      redisAddress: ""
      listName: "ocr-jobs"
      listLength: "5"        # ~1 replica per this many queued jobs
      pollingInterval: 15    # seconds between queue checks
      cooldownPeriod: 300    # seconds idle before scaling back toward minReplicas
      # Set ONLY for an external password-protected Redis: the name of an existing
      # Secret (and its key) holding the Redis password. Empty => no auth (the bundled
      # in-cluster Redis has none).
      redisPasswordSecret: ""
      redisPasswordKey: "password"

# -- Reverse tunnel (FRP) for OCR engines that run OUTSIDE the cluster — e.g. a GPU
#    box behind NAT that can dial out but accepts no inbound. The box runs a TuzkaOCR
#    engine + an `frpc` client that dials this in-cluster `frps` server; frps re-exposes
#    each engine's port inside the cluster, and taas consumes it as an ordinary
#    ClusterIP Service (see `tunnelBoxes`). No app changes — the remoteness is
#    transparent. Required when `tunnelBoxes` is non-empty. Box-side: deploy/box/.
tunnel:
  enabled: false
  image:
    repository: snowdreamtech/frps
    tag: "0.61.1"
  # frps control-plane (bind) port inside the pod. frpc dials this (via the Service
  # below); the actual reverse tunnels are opened on the per-engine `remotePort`s.
  controlPort: 7000
  service:
    # NodePort (MVP, bare metal) or LoadBalancer (cloud / MetalLB). This Service is
    # the ONLY thing the GPU box dials. For LoadBalancer, `nodePort` is ignored.
    type: NodePort
    # The port the GPU box dials: <any-node-ip>:<nodePort>. Must be in the cluster's
    # node-port range (default 30000–32767) and reachable from the box's network.
    nodePort: 32700
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 250m, memory: 128Mi }

# -- Defaults applied to every engine in a `tunnelBoxes[].engines` entry (deep-merged).
tunnelBoxesDefaults:
  # Logical Service port taas registers + connects to in-cluster. Equals the engine's
  # HTTP port on the box (frpc's localPort). Usually leave at 8000.
  port: 8000
  # taas concurrent dispatch cap for this backend (see ocrEngine.maxInflight).
  maxInflight: 8
  # Backend dispatch priority — higher backends are preferred until saturated, then
  # jobs spill to lower ones (submit worker orders by priority desc).
  priority: 0
  # Engine hardware class registered for this backend: "cpu" or "gpu".
  device: cpu

# -- Off-cluster boxes reached via the tunnel above. Empty = none. One box can run N
#    OCR engines but has at most one cAdvisor + one GPU exporter, so engines and
#    exporters are grouped per box. Each box item:
#      name      (required) -> identifies the box; used in Service names and frpc proxy
#                              names. Must be a DNS-1123 label.
#      engines   (required) -> list of OCR engines on the box. Each engine:
#          name       (required) -> Service <release>-tunnel-engine-<box>-<engine>,
#                                   registered as a backend like an in-cluster engine.
#          remotePort (required) -> port frps opens for THIS engine's reverse tunnel;
#                                   the box's frpc must request the same value.
#          + any tunnelBoxesDefaults key to override (port, maxInflight, priority, device).
#      exporters (optional)  -> cAdvisor / GPU exporter on the box, proxied through the
#                              same frpc. Each exporter:
#          name       (required) -> Service <release>-tunnel-box-<box>-<exporter>
#                                   (a Prometheus scrape target).
#          remotePort (required) -> port frps opens for this exporter's tunnel.
#          port       (required) -> in-cluster Service port (e.g. 8080 cAdvisor, 9835 GPU).
#    ALL remotePorts (engines + exporters, across ALL boxes) MUST be unique.
#    Requires `tunnel.enabled: true`.
tunnelBoxes: []
#   - name: box1
#     engines:
#       - name: gpu0
#         remotePort: 8000
#         device: gpu
#         priority: 10      # preferred over lower-priority backends until saturated
#       - name: gpu1
#         remotePort: 8001
#         device: gpu
#     exporters:            # one cAdvisor/GPU exporter per box, not per engine
#       - name: cadvisor
#         remotePort: 8010  # unique across ALL boxes, engines, and exporters
#         port: 8080        # Service port in-cluster
#       - name: gpu-exporter
#         remotePort: 8011
#         port: 9835
#   - name: box2
#     engines:
#       - name: cpu0
#         remotePort: 8100
#         device: cpu       # priority defaults to 0

# -- Prometheus ServiceMonitor for the per-box exporter Services. Requires the
#    Prometheus Operator (the ServiceMonitor CRD). When disabled, scrape the exporter
#    Services with a static scrape_config instead (see helm/taas/README.md).
metrics:
  serviceMonitor:
    enabled: false
    # Scrape interval for the generated ServiceMonitors.
    interval: 30s
    # Extra labels so your Prometheus' serviceMonitorSelector matches these (e.g.
    # { release: kube-prometheus-stack }).
    labels: {}

# -- Shared application config (non-secret). See app/config.Settings.
config:
  allowedExtensions: '[".tif",".tiff",".jpg",".jpeg",".png"]'
  maxUploadBytes: "104857600"
  # Tuned for sub-second-to-~1s OCR jobs: a 1s initial poll keeps backend slots
  # turning over near the job time without hammering the engine. Backoff still
  # adapts upward (to pollBackoffMax) for slow/dense GPU jobs.
  submitTickSeconds: "1.0"
  pollerTickSeconds: "1.0"
  pollerHarvestConcurrency: "10"
  pollBackoffInitial: "1.0"
  pollBackoffMax: "5.0"
  zstdCompressionLevel: "3"
  wsCatchUpSeconds: "120"
  logLevel: "INFO"
  # NOTE: rate limits are runtime config in the DB `config` table (rate_limit.*),
  # editable via the dashboard / PUT /admin/config — not env/Helm values.

# -- Secrets (override via --set or an external secret manager)
secrets:
  masterKey: "replaceMe"
  # Generate: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
  keyEncryptionSecret: "replace-with-a-fernet-key"
  postgresPassword: "replaceMe"
  minioIncomingAccessKey: "minioincoming"
  minioIncomingSecretKey: "replaceMe"
  minioResultsAccessKey: "minioresults"
  minioResultsSecretKey: "replaceMe"
  ocrEngineApiKey: "replaceMe"
  # Shared secret authenticating frpc (GPU box) to the in-cluster frps. Must match
  # the box's frpc auth.token. Only used when tunnel.enabled.
  frpToken: "replaceMe"

# -- Exposure. Each target is exposed via an Ingress, a Gateway API HTTPRoute,
#    or not at all  (kind: ingress | gateway | none):
#      api            -> API service          (job API at /api/v1, WebSocket at /ws)
#      legacy         -> compat service       (path prefix stripped before forwarding)
#      adminDashboard -> API service          (/admin, /dashboard, /static)
#      minioResults   -> minio-results service (so external clients can fetch presigned
#                        result URLs; use a dedicated host served at root — the bucket is
#                        in the path, so nothing is stripped)
#
#    gateway.* is used when kind=gateway (references an existing Gateway).
#    For kind=ingress on `legacy`, prefix-strip uses the ingress-nginx
#    rewrite-target annotation; override `annotations` for other controllers.
expose:
  api:
    kind: none
    host: ""
    paths: ["/api", "/ws"]
    ingressClassName: ""
    annotations: {}
    tls: []
    gateway: { name: "", namespace: "", sectionName: "" }
  legacy:
    kind: none
    host: ""
    pathPrefix: "/legacy"
    ingressClassName: ""
    annotations: {}
    tls: []
    gateway: { name: "", namespace: "", sectionName: "" }
  adminDashboard:
    kind: none
    host: ""
    paths: ["/admin", "/dashboard", "/static"]
    ingressClassName: ""
    annotations: {}
    tls: []
    gateway: { name: "", namespace: "", sectionName: "" }
  # Serve at root on a dedicated host; presign host auto-derives from host + tls (see
  # minio.results.publicUrl). Keep paths ["/"] so the S3 bucket path isn't rewritten.
  minioResults:
    kind: none
    host: ""
    paths: ["/"]
    ingressClassName: ""
    annotations: {}
    tls: []
    gateway: { name: "", namespace: "", sectionName: "" }
