# -- Global image settings
image:
  registry: ""
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []

# -- API (FastAPI: jobs, admin, dashboard, websocket)
api:
  replicaCount: 1
  image:
    repository: taas-api
  port: 8000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

# -- Background workers. Each key becomes a Deployment running
#    `python -m app.workers.<key>`. All share the worker image below.
worker:
  image:
    repository: taas-worker
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
workers:
  submit:
    replicaCount: 1
  poller:
    replicaCount: 1
  cleanup:
    replicaCount: 1

# -- Compat server (legacy PERO API: ProArc / AltoEditor)
compat:
  enabled: true
  replicaCount: 1
  image:
    repository: taas-compat
  port: 8001
  ttlSeconds: "3600"
  engines: '{"1": {"domain": "", "label": "Default", "description": "Default OCR engine"}, "2": {"domain": "kramarky", "label": "Kramarky", "description": "Engine for kramarky domain"}}'
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- Redis (StatefulSet) — job queue + pub/sub
redis:
  image:
    repository: redis
    tag: "7-alpine"
  port: 6379
  storage:
    size: 1Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

# -- PostgreSQL via CloudNativePG
cnpg:
  name: taas-db
  instances: 1
  storage:
    size: 10Gi
    storageClassName: ""
  database: taas
  owner: taas
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

# -- MinIO object storage (two instances: incoming uploads + results)
minio:
  image:
    repository: minio/minio
    tag: "latest"
  mcImage:
    repository: minio/mc
    tag: "latest"
  port: 9000
  # -- S3 region for MinIO (MINIO_SITE_REGION) and the presigned-URL signatures. The app's
  # signer and the server must agree on this value, so it's set in one place for both.
  region: eu-central-1
  incoming:
    bucket: incoming
    storage:
      size: 20Gi
      storageClassName: ""
  results:
    bucket: results
    # -- Externally-reachable MinIO endpoint used to presign result URLs (clients must reach
    # it; presigned URLs are SigV4-signed against this host). Empty => use the in-cluster URL,
    # which only works for clients inside the cluster. Set to your public MinIO endpoint.
    publicUrl: ""
    storage:
      size: 20Gi
      storageClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

# -- In-cluster TuzkaOCR engines. Defaults below apply to every entry in
#    `ocrEngines`; each entry sets a `name` and may override any key (deep-merged).
#    Each engine is deployed as its own Deployment + Service and auto-registered
#    as a taas backend. Empty `ocrEngines` list => no in-cluster engines (register
#    external backends via POST /admin/backends instead, e.g. a remote GPU box).
ocrEnginesDefaults:
  image:
    repository: tuzkaocr
    tag: "cpu"
  port: 8000
  # taas concurrent dispatch cap for this backend. Keep MAX_QUEUE (below) >= this,
  # or taas overflows the engine and gets 503s it must retry. Rule of thumb:
  # maxInflight == TUZKAOCR_MAX_QUEUE, and both >= TUZKAOCR_PAGE_WORKERS.
  maxInflight: 8
  env:
    TUZKAOCR_DEVICE: "cpu"
    # Recognizer runs one line at a time, so parallelism belongs at the line level,
    # not ONNX intra-op threads (see bench/DEFAULTS.md). ocr_threads>1 is never
    # faster for this model; a ~1-CPU scale-out engine uses line_workers=1.
    TUZKAOCR_OCR_THREADS: "1"
    TUZKAOCR_LINE_WORKERS: "1"
    # 2 pages at once so CPU isn't idle while one page waits on I/O (image fetch,
    # result write); both can run under the 2-CPU burst.
    TUZKAOCR_PAGE_WORKERS: "2"
    # Total active-job ceiling (running + queued) before the engine 503s. = maxInflight
    # (2 running + up to 6 staged), so taas never overflows it and workers stay fed.
    TUZKAOCR_MAX_QUEUE: "8"
  # -- Engine scratch volumes. Each is transient (results = finished ALTO/txt,
  #    auto-swept per MAX_JOB_AGE_HOURS once the poller harvests it; spool =
  #    upload spillover, only used for uploads >8 MiB). `type` selects the
  #    backing:
  #      memory   -> emptyDir on tmpfs (RAM-backed, fastest; its usage counts
  #                  against resources.limits.memory below). Default.
  #      emptyDir -> emptyDir on node disk (counts against ephemeral-storage).
  #      pvc      -> a PersistentVolumeClaim (survives pod restarts; uses
  #                  storageClassName).
  #    `size` is the emptyDir sizeLimit (memory/emptyDir) or the PVC request.
  #    Bump `spool` (or move it to disk/pvc) if you ingest very large images.
  storage:
    storageClassName: ""
    results:
      type: memory
      size: 128Mi
    spool:
      type: memory
      size: 256Mi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
      ephemeral-storage: 256Mi
    limits:
      cpu: "2"
      memory: 4Gi
      ephemeral-storage: 1Gi

# -- Engines to deploy + register. Empty = none. Each item: a `name` (required)
#    plus any keys from ocrEnginesDefaults to override (deep-merged).
ocrEngines: []
#   - name: cpu-1
#   - name: cpu-2
#       maxInflight: 4
#       env: { TUZKAOCR_LINE_WORKERS: "2", TUZKAOCR_MAX_QUEUE: "4" }  # spend burst on latency
#       resources: { limits: { cpu: "4" } }

# -- Shared application config (non-secret). See app/config.Settings.
config:
  allowedExtensions: '[".tif",".tiff",".jpg",".jpeg",".png"]'
  maxUploadBytes: "104857600"
  # Tuned for sub-second-to-~1s OCR jobs: a 1s initial poll keeps backend slots
  # turning over near the job time without hammering the engine. Backoff still
  # adapts upward (to pollBackoffMax) for slow/dense GPU jobs.
  submitTickSeconds: "1.0"
  pollerTickSeconds: "1.0"
  pollerHarvestConcurrency: "10"
  pollBackoffInitial: "1.0"
  pollBackoffMax: "30.0"
  zstdCompressionLevel: "3"
  rateLimitSubmitPerMinute: "60"
  rateLimitQueryPerMinute: "120"
  rateLimitWsConnectsPerMinute: "5"
  wsCatchUpSeconds: "120"

# -- Secrets (override via --set or an external secret manager)
secrets:
  masterKey: "replaceMe"
  # Generate: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
  keyEncryptionSecret: "replace-with-a-fernet-key"
  postgresPassword: "replaceMe"
  minioIncomingAccessKey: "minioincoming"
  minioIncomingSecretKey: "replaceMe"
  minioResultsAccessKey: "minioresults"
  minioResultsSecretKey: "replaceMe"
  ocrEngineApiKey: "replaceMe"

# -- Exposure. Each target is exposed via an Ingress, a Gateway API HTTPRoute,
#    or not at all  (kind: ingress | gateway | none):
#      api            -> API service     (job API at /api/v1, WebSocket at /ws)
#      legacy         -> compat service  (path prefix stripped before forwarding)
#      adminDashboard -> API service     (/admin, /dashboard, /static)
#
#    gateway.* is used when kind=gateway (references an existing Gateway).
#    For kind=ingress on `legacy`, prefix-strip uses the ingress-nginx
#    rewrite-target annotation; override `annotations` for other controllers.
expose:
  api:
    kind: none
    host: ""
    paths: ["/api", "/ws"]
    ingressClassName: ""
    annotations: {}
    tls: []
    gateway: { name: "", namespace: "", sectionName: "" }
  legacy:
    kind: none
    host: ""
    pathPrefix: "/legacy"
    ingressClassName: ""
    annotations: {}
    tls: []
    gateway: { name: "", namespace: "", sectionName: "" }
  adminDashboard:
    kind: none
    host: ""
    paths: ["/admin", "/dashboard", "/static"]
    ingressClassName: ""
    annotations: {}
    tls: []
    gateway: { name: "", namespace: "", sectionName: "" }
