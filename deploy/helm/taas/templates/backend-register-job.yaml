{{- if or .Values.ocrEngine.enabled .Values.tunnelBoxes }}
{{- $e := .Values.ocrEngine }}
{{- $name := printf "%s-ocr-engine" (include "taas.fullname" .) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "taas.fullname" . }}-backend-register
  labels:
    {{- include "taas.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend-register
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 20
  template:
    metadata:
      labels:
        {{- include "taas.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend-register
    spec:
      restartPolicy: OnFailure
      containers:
        - name: register
          image: curlimages/curl:latest
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: {{ include "taas.fullname" . }}-secret
          command:
            - /bin/sh
            - -c
            - |
              set -e
              API={{ printf "http://%s-api:%v" (include "taas.fullname" .) .Values.api.port }}
              echo "waiting for API..."
              until curl -sf "$API/healthz" >/dev/null; do sleep 3; done
              {{- if $.Values.ocrEngine.enabled }}
              {{- $max := int $e.autoscaling.maxReplicas }}
              {{- range $i := until $max }}
              URL="http://{{ $name }}-{{ $i }}.{{ $name }}:{{ $e.port }}"
              echo "registering ocr-engine-{{ $i }} -> $URL"
              curl -sf -X PUT "$API/admin/backends" \
                -H "X-Master-Key: $MASTER_KEY" \
                -H "Content-Type: application/json" \
                -d "{\"url\":\"$URL\",\"label\":\"ocr-engine-{{ $i }}\",\"api_key\":\"$OCR_ENGINE_API_KEY\",\"max_inflight\":{{ $e.maxInflight }},\"managed\":true}" \
                || echo "upsert ocr-engine-{{ $i }} failed"
              {{- end }}
              {{- end }}
              {{- range $box := $.Values.tunnelBoxes }}
              {{- range $te := ($box.engines | default list) }}
              {{- $tcfg := mergeOverwrite (deepCopy $.Values.tunnelBoxesDefaults) (deepCopy $te) }}
              {{- $tname := printf "%s-%s" $box.name $te.name }}
              {{- $tsvc := include "taas.tunnelEngineService" (dict "root" $ "box" $box.name "engine" $te.name) }}
              {{- $turl := printf "http://%s:%v" $tsvc $tcfg.port }}
              echo "registering tunnel engine {{ $tname }} -> {{ $turl }}"
              curl -sf -X PUT "$API/admin/backends" \
                -H "X-Master-Key: $MASTER_KEY" \
                -H "Content-Type: application/json" \
                -d "{\"url\":\"{{ $turl }}\",\"label\":\"{{ $tname }}\",\"api_key\":\"$OCR_ENGINE_API_KEY\",\"max_inflight\":{{ $tcfg.maxInflight }},\"device\":\"{{ $tcfg.device }}\",\"managed\":true}" \
                || echo "upsert {{ $tname }} failed"
              {{- end }}
              {{- end }}
              echo "done"
{{- end }}
