{{- $targets := include "taas.exposeTargets" . | fromYamlArray }}
{{- range $t := $targets }}
{{- if eq $t.cfg.kind "gateway" }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "taas.fullname" $ }}-{{ $t.name }}
  labels:
    {{- include "taas.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $t.name }}
spec:
  parentRefs:
    - name: {{ required "expose.<target>.gateway.name is required for kind=gateway" $t.cfg.gateway.name }}
      {{- if $t.cfg.gateway.namespace }}
      namespace: {{ $t.cfg.gateway.namespace | quote }}
      {{- end }}
      {{- if $t.cfg.gateway.sectionName }}
      sectionName: {{ $t.cfg.gateway.sectionName | quote }}
      {{- end }}
  {{- if $t.cfg.host }}
  hostnames:
    - {{ $t.cfg.host | quote }}
  {{- end }}
  rules:
    {{- if $t.strip }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ $t.cfg.pathPrefix | quote }}
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: {{ $t.service }}
          port: {{ $t.port }}
    {{- else }}
    - matches:
        {{- range $p := $t.cfg.paths }}
        - path:
            type: PathPrefix
            value: {{ $p | quote }}
        {{- end }}
      backendRefs:
        - name: {{ $t.service }}
          port: {{ $t.port }}
    {{- end }}
{{- end }}
{{- end }}
