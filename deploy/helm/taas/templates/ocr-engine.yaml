{{- range $e := .Values.ocrEngines }}
{{- $cfg := mergeOverwrite (deepCopy $.Values.ocrEnginesDefaults) (deepCopy $e) }}
{{- $ename := required "each ocrEngines entry needs a name" $e.name }}
{{- $name := printf "%s-ocr-engine-%s" (include "taas.fullname" $) $ename }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "taas.labels" $ | nindent 4 }}
    app.kubernetes.io/component: ocr-engine
    taas.mzk.cz/engine: {{ $ename }}
spec:
  replicas: 1
  # One pod per engine fronted by its own Service, so a job's POST and its
  # follow-up status/result GETs always hit the same pod. Recreate avoids two
  # pods racing the (RWO) storage during a rollout.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "taas.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: ocr-engine
      taas.mzk.cz/engine: {{ $ename }}
  template:
    metadata:
      labels:
        {{- include "taas.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: ocr-engine
        taas.mzk.cz/engine: {{ $ename }}
    spec:
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ocr-engine
          image: "{{ $cfg.image.repository }}:{{ $cfg.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $cfg.port }}
          env:
            {{- range $k, $v := $cfg.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            - name: TUZKAOCR_RESULTS_DIR
              value: /app/results
            - name: TUZKAOCR_SPOOL_DIR
              value: /app/spool
            - name: TUZKAOCR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "taas.fullname" $ }}-secret
                  key: OCR_ENGINE_API_KEY
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: results
              mountPath: /app/results
            - name: spool
              mountPath: /app/spool
          resources:
            {{- toYaml $cfg.resources | nindent 12 }}
      volumes:
        {{- range $vol := list "results" "spool" }}
        {{- $v := index $cfg.storage $vol }}
        - name: {{ $vol }}
          {{- if eq $v.type "pvc" }}
          persistentVolumeClaim:
            claimName: {{ $name }}-{{ $vol }}
          {{- else }}
          emptyDir:
            {{- if eq $v.type "memory" }}
            medium: Memory
            {{- end }}
            sizeLimit: {{ $v.size }}
          {{- end }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "taas.labels" $ | nindent 4 }}
    app.kubernetes.io/component: ocr-engine
    taas.mzk.cz/engine: {{ $ename }}
spec:
  type: ClusterIP
  ports:
    - port: {{ $cfg.port }}
      targetPort: http
      name: http
  selector:
    {{- include "taas.selectorLabels" $ | nindent 4 }}
    app.kubernetes.io/component: ocr-engine
    taas.mzk.cz/engine: {{ $ename }}
{{- range $vol := list "results" "spool" }}
{{- $v := index $cfg.storage $vol }}
{{- if eq $v.type "pvc" }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $name }}-{{ $vol }}
  labels:
    {{- include "taas.labels" $ | nindent 4 }}
    app.kubernetes.io/component: ocr-engine
    taas.mzk.cz/engine: {{ $ename }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if $cfg.storage.storageClassName }}
  storageClassName: {{ $cfg.storage.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ $v.size }}
{{- end }}
{{- end }}
{{- end }}
