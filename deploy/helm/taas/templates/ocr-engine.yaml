{{- if .Values.ocrEngine.enabled }}
{{- $e := .Values.ocrEngine }}
{{- $name := printf "%s-ocr-engine" (include "taas.fullname" .) }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $name }}
  labels:
    {{- include "taas.labels" . | nindent 4 }}
    app.kubernetes.io/component: ocr-engine
spec:
  serviceName: {{ $name }}
  # Floor only; the autoscaler (HPA) owns replicas at runtime.
  replicas: {{ $e.autoscaling.minReplicas | default 1 }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "taas.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ocr-engine
  template:
    metadata:
      labels:
        {{- include "taas.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ocr-engine
    spec:
      terminationGracePeriodSeconds: {{ $e.terminationGracePeriodSeconds | default 120 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ocr-engine
          image: "{{ $e.image.repository }}:{{ $e.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $e.port }}
          env:
            {{- range $k, $v := $e.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            - name: TUZKAOCR_RESULTS_DIR
              value: /app/results
            - name: TUZKAOCR_SPOOL_DIR
              value: /app/spool
            - name: TUZKAOCR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "taas.fullname" . }}-secret
                  key: OCR_ENGINE_API_KEY
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - { name: results, mountPath: /app/results }
            - { name: spool, mountPath: /app/spool }
          resources:
            {{- toYaml $e.resources | nindent 12 }}
      volumes:
        {{- range $vol := list "results" "spool" }}
        {{- $v := index $e.storage $vol }}
        - name: {{ $vol }}
          emptyDir:
            {{- if eq $v.type "memory" }}
            medium: Memory
            {{- end }}
            sizeLimit: {{ $v.size }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "taas.labels" . | nindent 4 }}
    app.kubernetes.io/component: ocr-engine
spec:
  clusterIP: None
  ports:
    - { port: {{ $e.port }}, targetPort: http, name: http }
  selector:
    {{- include "taas.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ocr-engine
{{- end }}
