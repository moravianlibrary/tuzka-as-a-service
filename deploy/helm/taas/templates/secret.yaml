apiVersion: v1
kind: Secret
metadata:
  name: {{ include "taas.fullname" . }}-secret
  labels:
    {{- include "taas.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ printf "postgresql+asyncpg://%s:%s@%s-rw:5432/%s" .Values.cnpg.owner .Values.secrets.postgresPassword .Values.cnpg.name .Values.cnpg.database | quote }}
  MASTER_KEY: {{ .Values.secrets.masterKey | quote }}
  KEY_ENCRYPTION_SECRET: {{ .Values.secrets.keyEncryptionSecret | quote }}
  MINIO_INCOMING_ACCESS_KEY: {{ .Values.secrets.minioIncomingAccessKey | quote }}
  MINIO_INCOMING_SECRET_KEY: {{ .Values.secrets.minioIncomingSecretKey | quote }}
  MINIO_RESULTS_ACCESS_KEY: {{ .Values.secrets.minioResultsAccessKey | quote }}
  MINIO_RESULTS_SECRET_KEY: {{ .Values.secrets.minioResultsSecretKey | quote }}
  OCR_ENGINE_API_KEY: {{ .Values.secrets.ocrEngineApiKey | quote }}
  {{- if .Values.tunnel.enabled }}
  FRP_TOKEN: {{ .Values.secrets.frpToken | quote }}
  {{- end }}
