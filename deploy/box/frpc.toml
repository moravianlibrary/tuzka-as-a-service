# frpc config for an off-cluster TuzkaOCR engine (GPU box behind NAT).
# Values are rendered by frp at startup from environment variables (see compose.yaml
# / .env), so this file does NOT need editing — set the .env instead.
#
# This dials the in-cluster frps (the <release>-frps NodePort) and opens a reverse
# tunnel: traffic that hits remotePort on the frps pod is delivered to the local
# TuzkaOCR engine. The cluster reaches the engine via the
# <release>-tunnel-engine-<box>-<engine> Service, and each exporter via the
# <release>-tunnel-box-<box>-<exporter> Service.

serverAddr = "{{ .Envs.FRP_SERVER_ADDR }}"
serverPort = {{ .Envs.FRP_SERVER_PORT }}
auth.method = "token"
auth.token = "{{ .Envs.FRP_TOKEN }}"

[[proxies]]
name = "{{ .Envs.FRP_PROXY_NAME }}"
type = "tcp"
# The engine container on this box (compose service name "tuzkaocr") + its HTTP port.
localIP = "tuzkaocr"
localPort = {{ .Envs.FRP_LOCAL_PORT }}
# MUST equal this engine's tunnelBoxes[].engines[].remotePort in the Helm values.
remotePort = {{ .Envs.FRP_REMOTE_PORT }}

# Optional exporter tunnels. frp uses Go text/template, so an unset env var leaves the
# block out entirely — a box without exporters (e.g. CPU-only) starts cleanly.
{{ if .Envs.FRP_CADVISOR_REMOTE_PORT -}}
[[proxies]]
name = "{{ .Envs.BOX_NAME }}-cadvisor"
type = "tcp"
localIP = "cadvisor"
localPort = 8080
# MUST equal this box's tunnelBoxes[].exporters[cadvisor].remotePort in the Helm values.
remotePort = {{ .Envs.FRP_CADVISOR_REMOTE_PORT }}
{{ end -}}
{{ if .Envs.FRP_GPU_EXPORTER_REMOTE_PORT -}}
[[proxies]]
name = "{{ .Envs.BOX_NAME }}-gpu-exporter"
type = "tcp"
localIP = "gpu-exporter"
localPort = 9835
# MUST equal this box's tunnelBoxes[].exporters[gpu-exporter].remotePort in the Helm values.
remotePort = {{ .Envs.FRP_GPU_EXPORTER_REMOTE_PORT }}
{{ end -}}
