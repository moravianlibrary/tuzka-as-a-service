# GPU overlay for deploy/box. Adds the NVIDIA device reservation to the engine
# services. Use only on a host with the nvidia-container-toolkit installed:
#   docker compose -f compose.yaml -f compose.gpu.yaml up -d
# Also set OCR_DEVICE=cuda in .env (and pick a CUDA image / Dockerfile.gpu).
services:
  tuzkaocr:
    deploy:
      resources:
        reservations:
          devices:
            - { driver: nvidia, count: all, capabilities: [gpu] }
  tuzkaocr-build:
    deploy:
      resources:
        reservations:
          devices:
            - { driver: nvidia, count: all, capabilities: [gpu] }

  # NVIDIA GPU metrics, scraped by the cluster Prometheus through the frpc tunnel
  # (see FRP_GPU_EXPORTER_REMOTE_PORT). Only present when this overlay is active.
  gpu-exporter:
    image: ${GPU_EXPORTER_IMAGE:-utkuozdemir/nvidia_gpu_exporter:1.2.1}
    runtime: nvidia
    restart: unless-stopped
    expose: ["9835"]
