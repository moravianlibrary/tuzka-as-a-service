# Off-cluster TuzkaOCR engine for a GPU box behind NAT.
#
# Runs the GPU OCR engine + an frpc reverse-tunnel client that dials the in-cluster
# frps server. The box needs only OUTBOUND access to <FRP_SERVER_ADDR>:<FRP_SERVER_PORT>
# (the taas <release>-frps NodePort). Configure via a .env file (see .env.example).
#
# Two ways to get the engine, selected by COMPOSE_PROFILES in .env (default: registry):
#   registry -> pull a prebuilt image (OCR_IMAGE):   docker compose up -d
#   build    -> build from a local checkout in ./TuzkaOCR:
#               docker compose --profile build up -d --build
# frpc runs under both profiles. The build service exposes the network alias "tuzkaocr"
# so frpc reaches it the same way regardless of mode.

# Shared engine config (both run modes). YAML merge via <<. CPU by default — the
# NVIDIA device reservation lives in compose.gpu.yaml so a CPU-only box can run
# `docker compose up` without the nvidia-container-toolkit. For a GPU box, add the
# overlay: `docker compose -f compose.yaml -f compose.gpu.yaml up -d`.
x-tuzkaocr-common: &tuzkaocr-common
  restart: unless-stopped
  environment:
    # MUST match the cluster's secrets.ocrEngineApiKey so taas can authenticate.
    TUZKAOCR_API_KEY: ${OCR_API_KEY:?set OCR_API_KEY in .env}
    TUZKAOCR_DEVICE: ${OCR_DEVICE:-cpu}
  # No published ports: the engine is reached ONLY through the tunnel.
  expose:
    - "8000"

services:
  # Option A — prebuilt image from a registry.
  tuzkaocr:
    <<: *tuzkaocr-common
    profiles: ["registry"]
    image: ${OCR_IMAGE:-registry.gitlab.mzk.cz/osdd/image/tuzka-as-a-service/tuzkaocr:1.3.0}

  # Option B — build from a local repo checkout in ./TuzkaOCR.
  tuzkaocr-build:
    <<: *tuzkaocr-common
    profiles: ["build"]
    image: ${OCR_IMAGE:-tuzkaocr:local}
    build:
      context: ${OCR_BUILD_CONTEXT:-./TuzkaOCR}
      dockerfile: ${OCR_DOCKERFILE:-Dockerfile}
    # Reachable as "tuzkaocr" (what frpc.toml points at) even though the service name differs.
    networks:
      default:
        aliases: ["tuzkaocr"]

  # cAdvisor — per-box container metrics, scraped by the cluster Prometheus through the
  # same frpc tunnel (see FRP_CADVISOR_REMOTE_PORT). Reachable only on the internal
  # compose network (expose only); the cluster reaches it via the tunnel-box Service.
  cadvisor:
    image: ${CADVISOR_IMAGE:-gcr.io/cadvisor/cadvisor:v0.49.1}
    profiles: ["registry", "build"]
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    expose: ["8080"]

  frpc:
    image: ${FRPC_IMAGE:-snowdreamtech/frpc:0.61.1}
    profiles: ["registry", "build"]
    restart: unless-stopped
    # No depends_on: frp keeps retrying the local engine until it answers, so this
    # works whichever engine service (registry or build) is active.
    volumes:
      - ./frpc.toml:/etc/frp/frpc.toml:ro
    environment:
      FRP_SERVER_ADDR: ${FRP_SERVER_ADDR:?set FRP_SERVER_ADDR (a cluster node IP) in .env}
      FRP_SERVER_PORT: ${FRP_SERVER_PORT:-32700}
      FRP_TOKEN: ${FRP_TOKEN:?set FRP_TOKEN (== cluster secrets.frpToken) in .env}
      # Box name — used to prefix the exporter proxy names so they stay unique across boxes.
      BOX_NAME: ${BOX_NAME:-box1}
      FRP_PROXY_NAME: ${ENGINE_NAME:-gpu1}
      # The port TuzkaOCR listens on inside its container (fixed by the image).
      FRP_LOCAL_PORT: "8000"
      FRP_REMOTE_PORT: ${REMOTE_PORT:?set REMOTE_PORT (== this engine's tunnelBoxes[].engines[].remotePort) in .env}
      # Optional exporter tunnels. Leave unset on a box without exporters — the matching
      # frpc.toml blocks are then skipped. Must match the box's tunnelBoxes[].exporters[].remotePort.
      FRP_CADVISOR_REMOTE_PORT: ${FRP_CADVISOR_REMOTE_PORT:-}
      FRP_GPU_EXPORTER_REMOTE_PORT: ${FRP_GPU_EXPORTER_REMOTE_PORT:-}
