# Example: ONE frpc multiplexing the HYBRID layout from compose.multi.example.yaml —
# 1 GPU engine + N one-core CPU engines on a single box. Copy to frpc.toml and edit.
# Each engine needs a UNIQUE remotePort that matches its tunnelBoxes[].engines[].remotePort
# in the Helm values, and a name that matches its tunnelBoxes[].engines[].name; `localIP`
# must match the compose service alias. See frpc.exporters.example.toml to also tunnel the
# box's cAdvisor / GPU exporter.
serverAddr = "10.0.0.10"      # a cluster node IP (tunnel.service.nodePort host)
serverPort = 32700
auth.method = "token"
auth.token = "replaceMe"      # == cluster secrets.frpToken

[[proxies]]
name = "box1-gpu"             # == tunnelBoxes[].engines[].name (give this a higher maxInflight)
type = "tcp"
localIP = "engine-gpu"        # compose alias of the GPU engine
localPort = 8000
remotePort = 8001             # == that engine's tunnelBoxes[].engines[].remotePort

[[proxies]]
name = "box1-cpu1"
type = "tcp"
localIP = "engine-cpu-1"
localPort = 8000
remotePort = 8002

[[proxies]]
name = "box1-cpu2"
type = "tcp"
localIP = "engine-cpu-2"
localPort = 8000
remotePort = 8003

[[proxies]]
name = "box1-cpu3"
type = "tcp"
localIP = "engine-cpu-3"
localPort = 8000
remotePort = 8004

# Add one [[proxies]] block per additional CPU engine (engine-cpu-4 -> remotePort 8005, …).
